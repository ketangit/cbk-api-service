# Apache Maven Wrapper configuration.
# distributionUrl  -> which Maven version the wrapper provisions.
# wrapperUrl       -> the wrapper jar; mvnw downloads this on first run, so the
#                     binary jar does not need to be committed to the repo.
wrapperVersion=3.3.2
distributionType=bin
distributionUrl=https://repo.maven.apache.org/maven2/org/apache/maven/apache-maven/3.9.16/apache-maven-3.9.16-bin.zip
wrapperUrl=https://repo.maven.apache.org/maven2/org/apache/maven/wrapper/maven-wrapper/3.3.2/maven-wrapper-3.3.2.jar
